<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>OG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=Noto+Sans+TC:wght@700;900&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #262642;
    --pink: #ff3399;
    --yellow: #f5df4d;
    --paper: #ffffff;
    --mute: #8e8ead;
    --sans: 'Inter', 'PingFang TC', 'Noto Sans TC', sans-serif;
    --serif: 'Times New Roman', 'Noto Serif TC', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    position: relative;
    padding: 56px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  body::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: var(--yellow);
    opacity: 0.85;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -150px;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: var(--pink);
    opacity: 0.18;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 1;
  }
  .brand img {
    width: 78px; height: 78px;
    border-radius: 16px;
    border: 1.5px solid var(--ink);
    padding: 6px;
    background: var(--paper);
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
  .brand-text strong {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.005em;
  }
  .brand-text span {
    font-weight: 400;
    font-size: 14px;
    color: var(--mute);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .center {
    position: relative;
    z-index: 1;
    margin-top: -20px;
  }
  .eyebrow {
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 18px;
  }
  .hero-line {
    display: flex;
    align-items: baseline;
    gap: 24px;
    flex-wrap: nowrap;
  }
  .eleven {
    font-weight: 900;
    font-size: 320px;
    line-height: 0.85;
    letter-spacing: -0.06em;
    color: var(--pink);
  }
  .label {
    font-weight: 900;
    font-size: 88px;
    line-height: 1;
    letter-spacing: -0.024em;
    color: var(--ink);
  }
  .invite {
    margin-top: 14px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    color: var(--ink);
  }
  .footer-tag {
    position: relative;
    z-index: 1;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
  }
</style>
</head>
<body>

<div class="brand">
  <img src="logo.png" alt="">
  <div class="brand-text">
    <strong>台北e東網路扶輪社</strong>
    <span>Rotary EClub of Taipei eEast</span>
  </div>
</div>

<div class="center">
  <div class="eyebrow">A Celebration · 11th Anniversary</div>
  <div class="hero-line">
    <span class="eleven">11</span>
    <span class="label">E 東社慶</span>
  </div>
  <div class="invite">— 邀請您與家人，一同共度這場專屬旅程。</div>
</div>

<div class="footer-tag">e 東社慶邀請 · Invitation</div>

</body>
</html>
