<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>OG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #262642;
    --pink: #ff3399;
    --yellow: #f5df4d;
    --paper: #ffffff;
    --mute: #8e8ead;
    --line: #e6e9ee;
    --sans: 'Inter', 'PingFang TC', 'Noto Sans TC', sans-serif;
    --serif: 'Times New Roman', 'Noto Serif TC', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    padding: 56px 80px 48px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* Top: brand */
  .brand { display: flex; align-items: center; gap: 18px; }
  .brand img {
    width: 76px; height: 76px;
    border-radius: 16px;
    border: 1.5px solid var(--ink);
    padding: 6px;
    background: var(--paper);
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
  .brand-text strong {
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.005em;
  }
  .brand-text span {
    font-weight: 400;
    font-size: 15px;
    color: var(--mute);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  /* Middle: big 11 + invitation */
  .hero {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 40px;
    flex: 1;
  }
  .hero-left { display: flex; flex-direction: column; }
  .num-row {
    display: flex;
    align-items: baseline;
    gap: 20px;
    position: relative;
  }
  .num {
    font-weight: 900;
    font-size: 280px;
    line-height: 0.85;
    letter-spacing: -0.06em;
    color: var(--pink);
    position: relative;
  }
  .num::after {
    content: '';
    position: absolute;
    top: 14%;
    right: -18px;
    width: 44px;
    height: 44px;
    background: var(--yellow);
    border-radius: 50%;
    z-index: -1;
  }
  .label {
    font-weight: 900;
    font-size: 80px;
    line-height: 1;
    letter-spacing: -0.024em;
    color: var(--ink);
  }
  .invite-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: right;
    gap: 8px;
    padding-bottom: 12px;
  }
  .invite-zh {
    font-weight: 900;
    font-size: 84px;
    line-height: 0.95;
    letter-spacing: -0.018em;
    color: var(--ink);
  }
  .invite-en {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    color: var(--pink);
    letter-spacing: 0.04em;
  }

  /* Bottom footer line */
  .footer-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .footer-text {
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .footer-date {
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.16em;
    color: var(--pink);
  }
</style>
</head>
<body>

<div class="brand">
  <img src="logo.png" alt="">
  <div class="brand-text">
    <strong>台北e東網路扶輪社</strong>
    <span>Rotary EClub of Taipei eEast</span>
  </div>
</div>

<div class="hero">
  <div class="hero-left">
    <div class="num-row">
      <span class="num">11</span>
      <span class="label">E 東社慶</span>
    </div>
  </div>
  <div class="invite-block">
    <div class="invite-zh">邀請您來</div>
    <div class="invite-en">— Invitation</div>
  </div>
</div>

<div class="footer-line">
  <div class="footer-text">11th Anniversary Celebration</div>
  <div class="footer-date">2026.06.27</div>
</div>

</body>
</html>
