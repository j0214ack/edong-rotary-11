<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>OG · 台北e東 11週年社慶</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff3399;
    --yellow: #f5df4d;
    --navy: #262642;
    --paper: #ffffff;
    --sans: 'Inter', 'PingFang TC', 'Noto Sans TC', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: var(--paper);
    color: var(--navy);
    font-family: var(--sans);
    font-weight: 800;
    position: relative;
    isolation: isolate;
  }

  /* ── PINK WEDGE on right side */
  .pink-block {
    position: absolute;
    inset: 0 0 0 auto;
    width: 540px;
    background: var(--pink);
    clip-path: polygon(72px 0, 100% 0, 100% 100%, 0 100%);
    z-index: 1;
  }
  .pink-block::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.18) 1px, transparent 1.4px);
    background-size: 14px 14px;
    opacity: 0.65;
    mix-blend-mode: screen;
  }

  /* ── editorial frame */
  .frame {
    position: absolute;
    inset: 22px;
    border: 1.5px solid var(--navy);
    pointer-events: none;
    z-index: 5;
  }

  /* ── MASTHEAD top-left */
  .masthead {
    position: absolute;
    top: 56px;
    left: 60px;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 16px 8px 8px;
    background: var(--paper);
    border: 1.5px solid var(--navy);
    border-radius: 999px;
  }
  .masthead img {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--paper);
    padding: 2px;
    flex-shrink: 0;
  }
  .masthead-text { display: flex; flex-direction: column; line-height: 1.18; padding-right: 6px; }
  .masthead-name {
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.005em;
    color: var(--navy);
    white-space: nowrap;
  }
  .masthead-tag {
    font-weight: 500;
    font-size: 12px;
    color: var(--navy);
    opacity: 0.7;
    margin-top: 2px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ── NO.11 tag top-right (on pink) */
  .issue-tag {
    position: absolute;
    top: 56px;
    right: 80px;
    z-index: 6;
    background: var(--navy);
    color: var(--paper);
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 4px;
  }
  .issue-tag b {
    color: var(--yellow);
    font-weight: 900;
    margin-left: 6px;
  }

  /* ── YELLOW DISC sun behind 11, straddling pink boundary */
  .yellow-disc {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: var(--yellow);
    top: 130px;
    left: 520px;
    z-index: 2;
    box-shadow: 14px 14px 0 0 rgba(38, 38, 66, 0.92);
  }

  /* ── BIG "11" sitting on yellow disc */
  .eleven {
    position: absolute;
    top: 88px;
    left: 520px;
    z-index: 3;
    font-family: var(--sans);
    font-weight: 900;
    font-size: 380px;
    line-height: 0.85;
    letter-spacing: -0.07em;
    color: var(--navy);
  }

  /* ── VERTICAL "邀請函" on pink — magazine spine label */
  .label {
    position: absolute;
    top: 90px;
    right: 60px;
    z-index: 4;
    font-family: var(--sans);
    font-weight: 900;
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: var(--paper);
    writing-mode: vertical-rl;
    text-orientation: upright;
  }

  /* ── BIG "E 東社慶" — bold sans pull-text, dominant on white side bottom-left */
  .hero-text {
    position: absolute;
    left: 60px;
    bottom: 144px;
    z-index: 4;
    font-family: var(--sans);
    font-weight: 900;
    font-size: 144px;
    line-height: 0.9;
    letter-spacing: -0.024em;
    color: var(--navy);
    white-space: nowrap;
  }
  .hero-text .accent {
    color: var(--pink);
    position: relative;
    display: inline-block;
  }
  .hero-text .accent::after {
    content: '';
    position: absolute;
    left: -4px;
    right: -4px;
    bottom: 8px;
    height: 14px;
    background: var(--yellow);
    z-index: -1;
  }

  /* ── subtitle: 11 週年社慶 · 邀請您來 — clear context line */
  .subtitle {
    position: absolute;
    left: 64px;
    bottom: 108px;
    z-index: 4;
    display: inline-flex;
    align-items: baseline;
    gap: 12px;
  }
  .subtitle-pill {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.005em;
    color: var(--navy);
    background: var(--yellow);
    padding: 4px 10px;
    border-radius: 4px;
    line-height: 1;
  }
  .subtitle-zh {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.005em;
    color: var(--navy);
    line-height: 1;
  }
  .subtitle-en {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--navy);
    opacity: 0.55;
    margin-left: 4px;
  }

  /* ── RSVP yellow stamp on pink area */
  .stamp {
    position: absolute;
    right: 88px;
    bottom: 140px;
    z-index: 4;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--yellow);
    border: 2px solid var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-12deg);
  }
  .stamp span {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 24px;
    letter-spacing: 0.04em;
    color: var(--navy);
    line-height: 0.9;
    text-align: center;
  }
  .stamp small {
    display: block;
    font-family: var(--sans);
    font-style: normal;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.04em;
    margin-top: 5px;
    color: var(--navy);
    opacity: 0.8;
    text-transform: none;
  }

  /* ── BOTTOM CAPTION BAR */
  .caption {
    position: absolute;
    left: 60px;
    right: 60px;
    bottom: 52px;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    font-family: var(--sans);
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--navy);
  }
  .caption-line { flex: 1; height: 1.5px; background: var(--navy); }
  .caption-left, .caption-center, .caption-right { white-space: nowrap; }
  .caption-right { color: var(--paper); }
  .caption-right .accent {
    color: var(--yellow);
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 0.02em;
    margin-right: 8px;
  }
</style>
</head>
<body>

  <div class="pink-block"></div>
  <div class="yellow-disc"></div>
  <div class="frame"></div>

  <div class="masthead">
    <img src="logo.png" alt="">
    <div class="masthead-text">
      <span class="masthead-name">台北e東網路扶輪社</span>
      <span class="masthead-tag">Rotary EClub of Taipei eEast</span>
    </div>
  </div>

  <div class="issue-tag">NO.<b>11</b></div>

  <div class="eleven">11</div>
  <div class="label">邀請函</div>

  <div class="hero-text">E <span class="accent">東社慶</span></div>
  <div class="subtitle">
    <span class="subtitle-pill">11 週年社慶</span>
    <span class="subtitle-zh">邀請您來</span>
    <span class="subtitle-en">An Invitation</span>
  </div>

  <div class="stamp">
    <span>RSVP<small>掃我報名</small></span>
  </div>

  <div class="caption">
    <span class="caption-left">EST. 2015</span>
    <span class="caption-line"></span>
    <span class="caption-center">TAIPEI eEAST · ANNIVERSARY ISSUE</span>
    <span class="caption-line"></span>
    <span class="caption-right"><span class="accent">vol. xi</span>2026 · 06 · 27</span>
  </div>

</body>
</html>
